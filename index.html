<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Lightweight Charts</title>
    <!-- โหลดไลบรารี Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        :root {
            --blue: #3b82f6;
            --gold: #fbbf24;
        }
        body {
            background-color: #141722;
            color: #cbd5e1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 10px;
        }
        .extended-hours {
            display: flex;
            gap: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        /* กำหนดขนาดของคอนเทนเนอร์กราฟ */
        #chart-container {
            width: 100%;
            height: 450px;
        }
        #volume-container {
            width: 100%;
            height: 150px;
        }
    </style>
</head>
<body>

    <!-- ส่วนหัวที่มีราคา Post-market (นำ Pre-market ออกแล้ว) -->
    <div class="header-container">
        <h2>Stock Chart</h2>
        <div class="extended-hours">
            <div>Post: <span id="post-price" style="color: var(--blue);">-</span></div>
        </div>
    </div>

    <!-- ส่วนของกราฟ -->
    <div id="chart-container"></div>
    <div id="volume-container"></div>

    <script>
        const chartContainer = document.getElementById('chart-container');
        const volumeContainer = document.getElementById('volume-container');

        // ==========================================
        // 1. สร้างกราฟแท่งเทียน (Candlestick Chart)
        // ==========================================
        const chart = LightweightCharts.createChart(chartContainer, {
            layout: { 
                textColor: '#cbd5e1', 
                background: { type: 'solid', color: '#141722' } 
            },
            grid: { 
                vertLines: { color: '#1e2232' }, 
                horzLines: { color: '#1e2232' } 
            },
            leftPriceScale: { 
                visible: true, 
                borderColor: '#242733', 
                scaleMargins: { top: 0.12, bottom: 0.12 } 
            },
            // 🟢 จุดแก้ไข: เพิ่ม minimumWidth: 80
            rightPriceScale: { 
                visible: true, 
                borderColor: '#242733', 
                scaleMargins: { top: 0.12, bottom: 0.12 }, 
                minimumWidth: 80 
            },
            timeScale: {
                borderColor: '#242733',
                visible: false, // ซ่อนเวลาในกราฟบนเพื่อไปโชว์ที่กราฟล่าง
                rightOffset: 50,
                barSpacing: 9,
                fixLeftEdge: false,
                fixRightEdge: false
            },
            handleScale: {
                axisPressedMouseMove: { time: true, price: false }
            }
        });

        const candlestickSeries = chart.addCandlestickSeries({
            upColor: '#26a69a', 
            downColor: '#ef5350', 
            borderVisible: false, 
            wickUpColor: '#26a69a', 
            wickDownColor: '#ef5350'
        });

        // ==========================================
        // 2. สร้างกราฟวอลลุ่ม (Volume Chart)
        // ==========================================
        const volumeChart = LightweightCharts.createChart(volumeContainer, {
            layout: { 
                textColor: '#cbd5e1', 
                background: { type: 'solid', color: '#141722' } 
            },
            grid: { 
                vertLines: { color: '#1e2232' }, 
                horzLines: { color: '#1e2232' } 
            },
            leftPriceScale: { 
                visible: false // ซ่อนแกนซ้ายของวอลลุ่ม
            },
            // 🟢 จุดแก้ไข: เพิ่ม minimumWidth: 80 ให้เท่ากับกราฟด้านบน
            rightPriceScale: { 
                visible: true, 
                borderColor: '#242733', 
                minimumWidth: 80 
            },
            timeScale: {
                borderColor: '#242733',
                timeVisible: true,
                rightOffset: 50,
                fixLeftEdge: false,
                fixRightEdge: false
            },
            handleScale: {
                axisPressedMouseMove: { time: true, price: false }
            }
        });

        const volumeSeries = volumeChart.addHistogramSeries({
            color: '#26a69a',
            priceFormat: { type: 'volume' },
            priceScaleId: '', 
        });

        // ==========================================
        // 3. ซิงค์ (Sync) กราฟทั้งสองตัวให้เลื่อนไปพร้อมกัน
        // ==========================================
        chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
            if (range) volumeChart.timeScale().setVisibleLogicalRange(range);
        });

        volumeChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
            if (range) chart.timeScale().setVisibleLogicalRange(range);
        });

        // ซิงค์ Crosshair (เส้นตัด) เมื่อขยับเมาส์
        function syncCrosshair(chartA, seriesA, chartB, seriesB) {
            chartA.subscribeCrosshairMove(param => {
                if (param.time !== undefined) {
                    const price = param.seriesPrices.get(seriesA);
                    chartB.setCrosshairPosition(price, param.time, seriesB);
                }
            });
        }
        syncCrosshair(chart, candlestickSeries, volumeChart, volumeSeries);
        syncCrosshair(volumeChart, volumeSeries, chart, candlestickSeries);

    </script>
</body>
</html>
